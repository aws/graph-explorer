name: Security Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Every day at 9:00 UTC
    - cron: "0 9 * * *"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy filesystem results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-fs-results.sarif
          category: dependency-scan

  docker-image-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: public.ecr.aws/neptune/graph-explorer:latest-SNAPSHOT
          vuln-type: os
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-image-results.sarif
          category: docker-image-scan
